# Publish to PyPI on tag (same model as patchnotes):
#   git tag v0.1.0 && git push --tags
#
# Wheel matrix: CPython 3.10+ (abi3) on manylinux, macOS x86-64 + arm64,
# and Windows x86-64, plus an sdist fallback.
# Requires a PyPI "trusted publisher" configured for this repo/workflow.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-15-intel # last Intel macOS image (supported to Aug 2027)
            target: x86_64
          - os: macos-latest # arm64
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  smoke-test:
    needs: [wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist
      - run: |
          pip install --no-index --find-links dist timefuzz
          pip install pytest hypothesis tzdata
          pytest tests -q

  publish:
    needs: [wheels, sdist, smoke-test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
